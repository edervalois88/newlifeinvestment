<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .ifpg-globe { fill: none; stroke: #1e3a5f; stroke-width: 2; }
      .ifpg-accent { fill: #d4a574; }
      .ifpg-text-main { font-family: Arial, sans-serif; font-size: 48px; font-weight: bold; color: #1e3a5f; }
      .ifpg-text-sub { font-family: Arial, sans-serif; font-size: 14px; color: #d4a574; }
    </style>
  </defs>

  <!-- Globe Icon -->
  <g transform="translate(50, 60)">
    <!-- Main circle -->
    <circle cx="0" cy="0" r="35" class="ifpg-globe"/>

    <!-- Horizontal line -->
    <line x1="-35" y1="0" x2="35" y2="0" class="ifpg-globe"/>

    <!-- Vertical lines (meridians) -->
    <path d="M -20,-35 Q -15,0 -20,35" class="ifpg-globe"/>
    <path d="M 0,-35 L 0,35" class="ifpg-globe"/>
    <path d="M 20,-35 Q 15,0 20,35" class="ifpg-globe"/>

    <!-- Curved accent -->
    <path d="M -25,-15 Q -15,0 -25,15" class="ifpg-accent" stroke-width="4"/>
  </g>

  <!-- IFPG Text -->
  <text x="140" y="75" class="ifpg-text-main">IFPG</text>

  <!-- Full Name -->
  <text x="140" y="100" class="ifpg-text-sub">International Franchise</text>
  <text x="140" y="115" class="ifpg-text-sub">Professionals Group</text>
</svg>